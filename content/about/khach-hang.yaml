title: “Lấy người dùng làm trung tâm”

intro: |-
  Quý khác hàng là trọng tâm của tất cả những gì chúng tôi làm. Quý vị là lý do tại sao chúng tôi hiện hữu.
  Chúng tôi luôn có tuân thủ nguyên tắc: Hiệu Quả - Dễ dàng thuận tiện - Minh bạch thông tin - Đúng cam kết. Tôn chỉ đối với khác hàng tượng trưng cho sự cam kết giữa chúng tôi và khách hàng chúng tôi phục vụ.

actions:
  - >-
    - Xây dựng văn hóa kinh doanh dựa trên phương châm “Lấy khách hàng làm
    trọng tâm”, mọi hoạt động của Công ty và nhân viên đều hướng tới mục
    tiêu cao nhất là thỏa mãn nhu cầu của khách hàng, luôn đặt mình vào vị
    trí của khách hàng để đánh giá và xem xét mọi vấn đề.
  - >-
    - Xây dựng hệ thống nguyên tắc giao tiếp, ứng xử đối với khách hàng
    dành cho cán bộ nhân viên, trong đó quy định rõ chức năng, nhiệm vụ và
    các hành vi chuẩn mực cần thực hiện.
  - >-
    - Thực hiện các chương trình chăm sóc khách hàng với nhiều nội dung
    hấp dẫn, thiết thực, đảm bảo quyền lợi và gia tăng lợi ích cho khách
    hàng.
  - >-
    - Chủ động xây dựng, triển khai (và luôn đồng hành cùng khách hàng)
    trong các chương trình xã hội từ thiện hướng tới cộng đồng, các chương
    trình bảo vệ môi trường…
