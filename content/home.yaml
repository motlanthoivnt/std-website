hero_quote: |-
  “Vì một tương lai sức khỏe,
  an toàn cho cộng đồng”
story_title: |-
  Chúng tôi là
  STDi Vietnam
  Co., ltd
story_intro: "Thành lập & hoạt động từ năm 2011 cho đến nay, STDi tập trung
  nghiên cứu và phát triển các dòng sản phẩm sức khỏe từ nguồn dược liệu Việt
  cho con người Việt Nam. Cho đến nay chúng tôi có 6 nhãn hiệu hoạt động chính
  bao gồm:"
story_brands:
  - V2JOY - Thực phẩm chăm sóc sức khỏe nam giới
  - VREADY - Trà thảo mộc từ thảo dược Việt
  - OTV - Cung cấp, mua bán dược liệu Việt
  - OysterKing - Nhóm sản phẩm từ Hàu Biển Việt Nam
sustain_intro: >-
  STD đặt cho mình sứ mệnh “Vì một tương lai sức khỏe, an toàn cho cộng đồng”,
  với 3 nhóm hoạt động chính là “Chăm sóc sức khỏe - Nâng cao đời sống - Phát
  triển tiềm năng vùng dược liệu”


  STD tin rằng, sự thành công của chúng tôi luôn song hành với những đóng góp
  tích cực cho cộng đồng thông qua việc sản xuất các sản phẩm có chất lượng cao
  nhất, chủ động tham gia nhiều hoạt động thiện nguyện và chung tay để bảo vệ
  môi trường xanh. Và hơn thế nữa chúng tôi luôn đồng hành cùng với người nông
  dân trồng dược liệu.
