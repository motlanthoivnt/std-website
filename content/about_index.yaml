card_team_title: |-
  Đội ngũ
  nhân sự
card_team_text: >-
  Trải qua chặng đường 11 năm trưởng thành và phát triển, chính những con
  người đã và đang có mặt STD đã làm nên những giá trị tốt đẹp, đóng góp
  vào thành công của công ty ngày hôm nay.

card_vision_title: |-
  Tầm nhìn, sứ mệnh
  và giá trị cốt lõi
card_vision_text: >-
  STD INTERNATIONNAL đặt cho mình sứ mệnh "Vì một tương lai sức khỏe, an
  toàn cho cộng đồng", với 3 nhóm hoạt động cốt lõi “Chăm sóc sức khỏe -
  Nâng cao đời sống - Phát triển tiềm năng vùng dược liệu”

card_customer_title: |-
  đối với
  Khách hàng
card_customer_text: >-
  Với khát vọng về thảo mộc Việt Nam, cũng như cung cấp đến Người tiêu
  dùng Việt Nam và Thế giới những giá trị từ thiên nhiên Việt Nam và
  những sản phẩm ứng dụng từ thảo mộc vào đời sống.
