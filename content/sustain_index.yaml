intro: |-
  STD đặt cho mình sứ mệnh "Vì một tương lai sức khỏe, an toàn cho cộng đồng", với 3 nhóm hoạt động chính là “Chăm sóc sức khỏe - Nâng cao đời sống - Phát triển tiềm năng vùng dược liệu”

  STD tin rằng, sự thành công của chúng tôi luôn song hành với những đóng góp tích cực cho cộng đồng thông qua việc sản xuất các sản phẩm có chất lượng cao nhất, chủ động tham gia nhiều hoạt động thiện nguyện và chung tay để bảo vệ môi trường xanh. Và hơn thế nữa chúng tôi luôn đồng hành cùng với người nông dân trồng dược liệu.

card_culture_title: |-
  văn hóa
  Doanh nghiệp
card_culture_text: >-
  STD INTERNATIONAL là nơi tập trung những con người ưu tú - Những người có
  tư tưởng và hành động kỷ luật, tài năng và bản lĩnh, luôn tâm niệm hướng
  tới vì cộng đồng và hơn thế nữa có tinh thần làm việc quyết liệt vì những
  mục đích tốt đẹp hơn.

card_strategy_title: |-
  chiến lược
  Con người
card_strategy_text: >-
  Tại STD luôn coi nguồn nhân lực là yếu tố cốt lõi và là tài sản quý giá.
  Để vững bước trên hành trình xây dựng và phát triển doanh nghiệp vững
  mạnh; đồng thời đưa đến khách hàng những sản phẩm an toàn, chất lượng
  cao.

card_environment_title: |-
  môi trường
  và cộng đồng
card_environment_text: >-
  Với mục tiêu phát triển bền vững, STD hiểu rõ tầm quan trọng của việc bảo
  vệ môi trường và lợi ích cộng đồng.Trong 11 năm STD không ngừng lớn mạnh
  qua từng giai đoạn phát triển cùng với chủ trương: gắn chặt lợi ích
  doanh nghiệp với lợi ích của cộng đồng.
