lead: >-
  Tại STD luôn coi nguồn nhân lực là yếu tố cốt lõi và là tài sản quý giá.
  Để vững bước trên hành trình xây dựng và phát triển doanh nghiệp vững
  mạnh; đồng thời đưa đến khách hàng những sản phẩm an toàn, chất lượng
  cao.

image: article-people.jpg

body: |-
  Chiến lược tuyển dụng nhân tài của STD hướng đến việc xây dựng đội ngũ năng lực và nhiệt huyết, đam mê nông sản, dược liệu, quyết tâm hoàn thành chỉ tiêu cá nhân & có khả năng làm việc nhóm hiệu quả mang đến sự gắn kết giữa các phòng ban khác nhau cùng hướng đến mục tiêu chung tạo nên giá trị lợi ích cho các bên liên quan. Vì thế, chúng tôi không ngừng tìm kiếm và tuyển chọn các ứng viên với kỹ năng chuyên môn vững vàng cùng tính cách phù hợp để phát triển sự nghiệp cùng STD trên con đường nông sản, dược liệu.

  Triết lý tuyển dụng của chúng tôi được đúc kết dựa trên những giá trị cốt lõi của STD được thể hiện mạnh mẽ qua Tinh thần STD. Đó là sự biểu trưng cho hiện tại của STD và cả những mục tiêu mà STD muốn hướng đến trong tương lai.

  Do đó, một ứng viên lý tưởng là người có chuyên môn xuất sắc với ý chí cầu tiến mạnh mẽ cùng thái độ hợp tác chân thành với đồng nghiệp và khách hàng, đó còn là sự tinh tế trong ứng xử và sự cam kết làm việc minh bạch. Chúng tôi mang đến cơ hội nghề nghiệp đa dạng từ cấp bậc, phòng ban chức năng đến các khu vực hoạt động của STD. Bất cứ lúc nào, chúng tôi đều muốn chắc chắn rằng tất cả nhân viên đều có đủ sự thử thách trong công việc để thúc đẩy giới hạn của họ và không ngừng nâng cao năng lực.
