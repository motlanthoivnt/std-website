lead: >-
  Với mục tiêu phát triển bền vững, STD hiểu rõ tầm quan trọng của việc bảo
  vệ môi trường và lợi ích cộng đồng.Trong 11 năm STD không ngừng lớn mạnh
  qua từng giai đoạn phát triển cùng với chủ trương: gắn chặt lợi ích doanh
  nghiệp với lợi ích của cộng đồng.

band_title: |-
  Gắn liền với các
  giá trị bền vững
band_sub: STD Quốc tế luôn ý thức về nghĩa vụ và trách nhiệm của mình đối với xã hội.
band_image: community-hands.jpg

after: >-
  Là một trong những công ty hàng đầu về ngành nông sản, dược liệu. STD
  khẳng định mọi hoạt động phát triển của chúng tôi đều gắn liền với các
  giá trị bền vững, đóng góp cho cộng đồng và góp phần phát triển nền
  kinh tế xanh. Chúng tôi không ngừng nỗ lực tạo ra những sản phẩm chất
  lượng, nâng cao cuộc sống và bảo vệ môi trường để đóng góp cho một cộng
  đồng và xã hội tốt đẹp hơn.
